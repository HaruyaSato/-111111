<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Hatchoria - 新規登録</title>

    <link rel="stylesheet"
          href="login.css">

    <script type="module"
            src="firebase.js"></script>

    <script type="module"
            src="register.js"
            defer></script>

</head>

<body>

<div class="background"></div>

<div class="login-container">

    <div class="logo-area">

        <img src="../assets/images/egg.png"
             class="egg-image">

        <h1>新規登録</h1>

        <p>Hatchoriaへようこそ！</p>

    </div>


    <form id="registerForm">

        <div class="input-group">

            <label>メールアドレス</label>

            <input
                type="email"
                id="email"
                required>

        </div>

        <div class="input-group">

            <label>パスワード</label>

            <input
                type="password"
                id="password"
                required>

        </div>

        <div class="input-group">

            <label>パスワード（確認）</label>

            <input
                type="password"
                id="password2"
                required>

        </div>

        <button
            class="login-btn">

            新規登録

        </button>

    </form>

    <button
        id="backButton"
        class="register-btn">

        ログインへ戻る

    </button>

    <div id="message"></div>

</div>

</body>

</html>
